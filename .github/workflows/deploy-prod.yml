name: Deploy to Production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Slack - Deployment Started
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"🚀 Production deployment started\",
              \"attachments\": [
                {
                  \"color\": \"#ff9900\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"main\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production Server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s <<'DEPLOY_SCRIPT'
            set -e
            echo "=== Starting production deployment ==="
            APP_DIR=~/apmclaw
            PM2_APP_NAME="apmclaw"

            # 프로젝트 초기 클론 (없으면)
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/apmcoin/apmclaw.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # PM2 먼저 정지 (git reset 시 config 변경 감지 → orphan spawn 방지)
            if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
              pm2 stop "$PM2_APP_NAME" 2>/dev/null || true
              pm2 delete "$PM2_APP_NAME" 2>/dev/null || true
            fi
            fuser -k 18790/tcp 2>/dev/null || true
            sleep 1

            git fetch origin main
            git reset --hard origin/main

            # .env 작성
            cat > .env <<'ENVEOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_TOKEN_PROD }}
          AWS_BEARER_TOKEN_BEDROCK=${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION=us-east-1
          BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}
          TELEGRAM_CHAT_IDS_FORWARD_SPAM=${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_PROD }}
          ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # config 작성
            mkdir -p config
            IFS="	 ," read -ra CHAT_IDS <<< "${{ secrets.TELEGRAM_CHAT_IDS_PROD }}"
            GROUPS_JSON=""
            for chat_id in "${CHAT_IDS[@]}"; do
              chat_id=$(echo "$chat_id" | xargs)
              if [ -n "$GROUPS_JSON" ]; then
                GROUPS_JSON+=","
              fi
              GROUPS_JSON+="\"$chat_id\": {\"requireMention\": false, \"enabled\": true}"
            done

            cat > config/apmclaw.json <<CONFIGEOF
          {
            "meta": {
              "lastTouchedVersion": "2026.3.3",
              "lastTouchedAt": "2026-03-15T00:00:00.000Z"
            },
            "models": {
              "mode": "replace",
              "bedrockDiscovery": {
                "enabled": true,
                "region": "us-east-1",
                "providerFilter": ["anthropic"],
                "refreshInterval": 3600,
                "defaultContextWindow": 200000,
                "defaultMaxTokens": 4096
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "amazon-bedrock/us.anthropic.claude-sonnet-4-6",
                  "fallbacks": []
                },
                "compaction": {
                  "mode": "safeguard"
                }
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "\${TELEGRAM_BOT_TOKEN}",
                "groups": {
                  $GROUPS_JSON
                },
                "groupPolicy": "allowlist",
                "streaming": "off",
                "autoDeleteSystemMessages": true,
                "forwardSpamChatId": "${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_PROD }}"
              }
            },
            "gateway": {
              "auth": {
                "mode": "token",
                "token": "$(openssl rand -hex 24)"
              },
              "controlUi": {
                "enabled": false
              }
            }
          }
          CONFIGEOF
            sed -i 's/^[[:space:]]*//' config/apmclaw.json

            # workspace 전체 초기화 (봇 시작 시 템플릿에서 자동 복사됨)
            rm -rf "$HOME/.apmclaw/workspace"
            rm -rf workspace/

            # 메모리 인덱스 삭제 (재인덱싱 강제)
            rm -f config/memory/*.sqlite
            rm -f "$HOME/.apmclaw/memory/"*.sqlite

            # 의존성 설치 & 빌드
            pnpm install --frozen-lockfile
            pnpm build

            # PM2로 실행 (포트 18790 — dev와 분리)
            export APMCLAW_STATE_DIR="$APP_DIR/config"
            export APMCLAW_LOG_LEVEL=debug
            export NODE_ENV=production

            pm2 start dist/entry.mjs \
              --name "$PM2_APP_NAME" \
              --node-args="--no-warnings" \
              -- gateway --bind lan --allow-unconfigured --port 18790

            pm2 save
            sleep 3
            pm2 logs "$PM2_APP_NAME" --lines 15 --nostream
            echo "=== Production deployment successful! ==="
          DEPLOY_SCRIPT

      - name: Notify Slack - Deployment Success
        if: success()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"✅ Production deployment succeeded\",
              \"attachments\": [
                {
                  \"color\": \"good\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"main\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Server\",
                      \"value\": \"Production (PM2)\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": false
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Notify Slack - Deployment Failed
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"❌ Production deployment FAILED\",
              \"attachments\": [
                {
                  \"color\": \"danger\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"main\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                      \"style\": \"danger\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"
