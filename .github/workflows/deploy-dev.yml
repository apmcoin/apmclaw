name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Slack - Deployment Started
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"🚀 Dev deployment started\",
              \"attachments\": [
                {
                  \"color\": \"#0066cc\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Ubuntu Server
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN_DEV }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TELEGRAM_CHAT_IDS_DEV: ${{ secrets.TELEGRAM_CHAT_IDS_DEV }}
          TELEGRAM_CHAT_IDS_FORWARD_SPAM: ${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_DEV }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s <<'DEPLOY_SCRIPT'
            set -e
            echo "=== Starting deployment ==="
            cd ~/apmclaw-dev
            git fetch origin dev
            git reset --hard origin/dev

            cat > .env <<'ENVEOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_TOKEN_DEV }}
          AWS_BEARER_TOKEN_BEDROCK=${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION=us-east-1
          BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}
          TELEGRAM_CHAT_IDS_FORWARD_SPAM=${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_DEV }}
          ENVEOF
            # .env 줄 앞 공백 제거
            sed -i 's/^[[:space:]]*//' .env

            mkdir -p config
            IFS="  ," read -ra CHAT_IDS <<< "${{ secrets.TELEGRAM_CHAT_IDS_DEV }}"
            GROUPS_JSON=""
            for chat_id in "${CHAT_IDS[@]}"; do
              chat_id=$(echo "$chat_id" | xargs)
              if [ -n "$GROUPS_JSON" ]; then
                GROUPS_JSON+=","
              fi
              GROUPS_JSON+="\"$chat_id\": {\"requireMention\": false, \"enabled\": true}"
            done

            cat > config/apmclaw.json <<CONFIGEOF
          {
            "meta": {
              "lastTouchedVersion": "2026.3.3",
              "lastTouchedAt": "2026-03-15T00:00:00.000Z"
            },
            "models": {
              "mode": "replace",
              "bedrockDiscovery": {
                "enabled": true,
                "region": "us-east-1",
                "providerFilter": ["anthropic"],
                "refreshInterval": 3600,
                "defaultContextWindow": 200000,
                "defaultMaxTokens": 4096
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "amazon-bedrock/us.anthropic.claude-sonnet-4-6",
                  "fallbacks": []
                },
                "compaction": {
                  "mode": "safeguard"
                }
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ secrets.TELEGRAM_TOKEN_DEV }}",
                "groups": {
                  $GROUPS_JSON
                },
                "groupPolicy": "open",
                "streaming": "off",
                "autoDeleteSystemMessages": true,
                "forwardSpamChatId": "${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_DEV }}"
              }
            },
            "gateway": {
              "auth": {
                "mode": "token",
                "token": "7f1d4ffa9a239106a4ae4b74b77cacfdc5ddfcdfc29790d5"
              },
              "controlUi": {
                "enabled": false
              }
            }
          }
          CONFIGEOF
            # config JSON 줄 앞 공백 제거
            sed -i 's/^[[:space:]]*//' config/apmclaw.json

            docker compose build
            docker compose up -d
            sleep 5
            docker logs apmclaw --tail 20
            echo "✅ Deployment successful!"
          DEPLOY_SCRIPT

      - name: Notify Slack - Deployment Success
        if: success()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"✅ Dev deployment succeeded\",
              \"attachments\": [
                {
                  \"color\": \"good\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Server\",
                      \"value\": \"13.209.45.80\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": false
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Notify Slack - Deployment Failed
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"❌ Dev deployment failed\",
              \"attachments\": [
                {
                  \"color\": \"danger\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                      \"style\": \"danger\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"
