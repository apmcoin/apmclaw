name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Slack - Deployment Started
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"🚀 Dev deployment started\",
              \"attachments\": [
                {
                  \"color\": \"#0066cc\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deploy script to server
        run: |
          scp scripts/deploy.sh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/apmclaw-dev/deploy.sh
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod +x ~/apmclaw-dev/deploy.sh"

      - name: Deploy to Ubuntu Server
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN_DEV }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TELEGRAM_CHAT_IDS_DEV: ${{ secrets.TELEGRAM_CHAT_IDS_DEV }}
          TELEGRAM_CHAT_IDS_FORWARD_SPAM: ${{ secrets.TELEGRAM_CHAT_IDS_FORWARD_SPAM_DEV }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "export TELEGRAM_BOT_TOKEN='$TELEGRAM_BOT_TOKEN' && \
             export AWS_BEARER_TOKEN_BEDROCK='$AWS_BEARER_TOKEN_BEDROCK' && \
             export BRAVE_SEARCH_API_KEY='$BRAVE_SEARCH_API_KEY' && \
             export TELEGRAM_CHAT_IDS_DEV='$TELEGRAM_CHAT_IDS_DEV' && \
             export TELEGRAM_CHAT_IDS_FORWARD_SPAM='$TELEGRAM_CHAT_IDS_FORWARD_SPAM' && \
             ~/apmclaw-dev/deploy.sh"

      - name: Notify Slack - Deployment Success
        if: success()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"✅ Dev deployment succeeded\",
              \"attachments\": [
                {
                  \"color\": \"good\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Server\",
                      \"value\": \"13.209.45.80\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": false
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"

      - name: Notify Slack - Deployment Failed
        if: failure()
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Co-Authored-By 파싱
          CO_AUTHORS=$(git log -1 --format=%B | grep -i "Co-Authored-By:" | sed 's/Co-Authored-By: //' | tr '\n' ', ' | sed 's/, $//')
          if [ -n "$CO_AUTHORS" ]; then
            AUTHOR_TEXT="${{ github.actor }}, $CO_AUTHORS"
          else
            AUTHOR_TEXT="${{ github.actor }}"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"username\": \"${{ github.actor }}\",
              \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
              \"text\": \"❌ Dev deployment failed\",
              \"attachments\": [
                {
                  \"color\": \"danger\",
                  \"fields\": [
                    {
                      \"title\": \"Repository\",
                      \"value\": \"<https://github.com/${{ github.repository }}|${{ github.repository }}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Branch\",
                      \"value\": \"dev\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Commit\",
                      \"value\": \"<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}>\",
                      \"short\": true
                    },
                    {
                      \"title\": \"Authors\",
                      \"value\": \"$AUTHOR_TEXT\",
                      \"short\": true
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"button\",
                      \"text\": \"View Logs\",
                      \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                      \"style\": \"danger\"
                    }
                  ],
                  \"footer\": \"apM Claw DevOps\",
                  \"footer_icon\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                }
              ]
            }"
